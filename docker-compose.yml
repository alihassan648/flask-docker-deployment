services:
  flask:
    build: .
    container_name: flask-app
    restart: always
    ports:
      - "127.0.0.1:5000:5000"
    environment:
      - DB_HOST=db
      - DB_NAME=appdb
      - DB_USER=sohail
      - DB_PASSWORD=secret
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    container_name: postgres-db
    restart: always
    environment:
      - POSTGRES_DB=appdb
      - POSTGRES_USER=sohail
      - POSTGRES_PASSWORD=secret
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
